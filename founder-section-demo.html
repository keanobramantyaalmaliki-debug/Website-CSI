<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Founder Section — CSI Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0A0A0A;
    color: #F0F0F0;
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Custom cursor */
  body { cursor: none; }
  .cursor {
    position: fixed;
    width: 8px;
    height: 8px;
    background: #F0F0F0;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.25s ease, height 0.25s ease, background 0.25s ease, border-radius 0.25s ease;
  }
  .cursor.is-hovering {
    width: 32px;
    height: 32px;
    background: transparent;
    border: 1px solid rgba(240,240,240,0.6);
    border-radius: 50%;
  }
  .cursor.is-hovering::before,
  .cursor.is-hovering::after {
    content: '';
    position: absolute;
    background: #F0F0F0;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .cursor.is-hovering::before { width: 10px; height: 1px; }
  .cursor.is-hovering::after  { width: 1px; height: 10px; }

  /* Floating founder photo */
  /* Wrapper: position + rotation dikontrol JS */
  .floating-wrapper {
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 100;
    transform: translate(-50%, -62%) rotate(0deg);
    will-change: transform;
  }
  /* Inner: scale + opacity dikontrol CSS transition */
  .floating-img {
    width: 240px;
    height: 320px;
    transform: scale(0.05);
    opacity: 0;
    transition: opacity 0.7s cubic-bezier(0.34, 1.56, 0.64, 1),
                transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    will-change: transform, opacity;
  }
  .floating-img.visible {
    opacity: 1;
    transform: scale(1);
  }
  .floating-img.hiding {
    opacity: 0;
    transform: scale(0.05);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .floating-img .placeholder {
    width: 100%;
    height: 100%;
    background: #1A1A1A;
    border: 1px solid #2A2A2A;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    color: #3A3A3A;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .floating-img .placeholder .icon { font-size: 28px; color: #2A2A2A; }

  /* Section wrapper */
  .section {
    width: 100%;
    max-width: 1100px;
    padding: 100px 60px;
  }

  .section-label {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #3A3A3A;
    margin-bottom: 72px;
  }

  /* Achievement list */
  .achievement-list { width: 100%; }

  .achievement-item {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 48px;
    padding: 88px 0;
    border-top: 1px solid #1A1A1A;
    cursor: none;
    transition: opacity 0.25s ease;
  }
  .achievement-item:last-child { border-bottom: 1px solid #1A1A1A; }
  .achievement-list.has-hover .achievement-item:not(.is-hovered) { opacity: 0.2; }

  /* Left: founder card */
  .founder-card {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    border: 1px solid #1F1F1F;
    background: #111;
    align-self: flex-start;
  }
  .thumb {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
    background: #222;
    border: 1px solid #2A2A2A;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: #333;
  }
  .card-info { display: flex; flex-direction: column; gap: 3px; padding-top: 2px; }
  .card-name  { font-size: 12px; font-weight: 500; color: #D0D0D0; letter-spacing: 0.01em; }
  .card-title { font-size: 9px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }

  /* Right: content */
  .item-content {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 48px;
  }
  .item-desc {
    font-size: 36px;
    font-weight: 400;
    color: #E0E0E0;
    line-height: 1.3;
    letter-spacing: -0.03em;
    cursor: none;
    overflow: hidden;
  }
  .item-meta {
    display: flex;
    align-items: center;
    gap: 0;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #3A3A3A;
  }
  .item-meta span { margin-right: 24px; }
  .item-meta .dot {
    width: 3px;
    height: 3px;
    background: #2A2A2A;
    border-radius: 50%;
    display: inline-block;
    margin-right: 24px;
    vertical-align: middle;
    flex-shrink: 0;
  }
  .item-meta .arrow {
    margin-left: auto;
    margin-right: 0;
    font-size: 13px;
    color: #2A2A2A;
    transition: color 0.2s, transform 0.2s;
  }
  .achievement-item:hover .item-meta { color: #555; }
  .achievement-item:hover .item-meta .arrow {
    color: #888;
    transform: translate(3px, -3px);
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<div class="floating-wrapper" id="floatingWrapper">
  <div class="floating-img" id="floatingImg">
    <div class="placeholder">
      <span class="icon">◉</span>
      Foto Founder
    </div>
  </div>
</div>

<section class="section">
  <p class="section-label">Founder</p>

  <div class="achievement-list" id="achievementList">

    <div class="achievement-item">
      <div class="founder-card">
        <div class="thumb">◉</div>
        <div class="card-info">
          <span class="card-name">Fami Maliki</span>
          <span class="card-title">Founder &amp; CEO</span>
        </div>
      </div>
      <div class="item-content">
        <p class="item-desc">Penghargaan atas inovasi digital terbaik dalam kategori teknologi bisnis.</p>
        <div class="item-meta">
          <span>Award</span><span class="dot"></span>
          <span>Digital Innovation</span><span class="dot"></span>
          <span>2023</span>
          <span class="arrow">↗</span>
        </div>
      </div>
    </div>

    <div class="achievement-item">
      <div class="founder-card">
        <div class="thumb">◉</div>
        <div class="card-info">
          <span class="card-name">Fami Maliki</span>
          <span class="card-title">Founder &amp; CEO</span>
        </div>
      </div>
      <div class="item-content">
        <p class="item-desc">Keynote speaker pada konferensi teknologi dan inovasi bisnis terkemuka.</p>
        <div class="item-meta">
          <span>Speaking</span><span class="dot"></span>
          <span>Technology</span><span class="dot"></span>
          <span>2024</span>
          <span class="arrow">↗</span>
        </div>
      </div>
    </div>

  </div>
</section>

<script>
  class TextScramble {
    constructor(el) {
      this.el = el;
      this.original = el.innerText;
      this.chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      this.raf = null;
    }
    scramble() {
      this.el.style.width  = this.el.offsetWidth  + 'px';
      this.el.style.height = this.el.offsetHeight + 'px';
      const text = this.original;
      const duration = 420;
      const start = performance.now();
      cancelAnimationFrame(this.raf);
      const update = (now) => {
        const progress = Math.min((now - start) / duration, 1);
        let output = '';
        for (let i = 0; i < text.length; i++) {
          if (text[i] === ' ') { output += ' '; continue; }
          if (progress > i / text.length) {
            output += text[i];
          } else {
            output += this.chars[Math.floor(Math.random() * this.chars.length)];
          }
        }
        this.el.innerText = output;
        if (progress < 1) this.raf = requestAnimationFrame(update);
        else this.el.innerText = text;
      };
      this.raf = requestAnimationFrame(update);
    }
    reset() {
      cancelAnimationFrame(this.raf);
      this.el.innerText = this.original;
      this.el.style.width  = '';
      this.el.style.height = '';
    }
  }

  const cursor         = document.getElementById('cursor');
  const floatingWrapper = document.getElementById('floatingWrapper');
  const floatingImg    = document.getElementById('floatingImg');
  const items          = document.querySelectorAll('.achievement-item');

  let mouseX = 0, mouseY = 0, prevMouseX = 0;
  let imgX = 0, imgY = 0;
  let rotation = 0, targetRotation = 0;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    cursor.style.left = mouseX + 'px';
    cursor.style.top  = mouseY + 'px';
  });

  function lerp(a, b, t) { return a + (b - a) * t; }

  (function loop() {
    const velocityX = mouseX - prevMouseX;
    prevMouseX = mouseX;

    targetRotation = -velocityX * 0.4;
    rotation = lerp(rotation, targetRotation, 0.08);

    imgX = lerp(imgX, mouseX, 0.09);
    imgY = lerp(imgY, mouseY, 0.09);

    floatingWrapper.style.left = imgX + 'px';
    floatingWrapper.style.top  = imgY + 'px';
    floatingWrapper.style.transform = `translate(-50%, -62%) rotate(${rotation}deg)`;

    requestAnimationFrame(loop);
  })();

  const list  = document.getElementById('achievementList');
  const descs = document.querySelectorAll('.item-desc');

  descs.forEach(desc => {
    const item    = desc.closest('.achievement-item');
    const scrambler = new TextScramble(desc);

    desc.addEventListener('mouseenter', () => {
      scrambler.scramble();
      floatingImg.classList.remove('hiding');
      floatingImg.classList.add('visible');
      cursor.classList.add('is-hovering');
      list.classList.add('has-hover');
      item.classList.add('is-hovered');
    });
    desc.addEventListener('mouseleave', () => {
      scrambler.reset();
      floatingImg.classList.remove('visible');
      floatingImg.classList.add('hiding');
      cursor.classList.remove('is-hovering');
      list.classList.remove('has-hover');
      item.classList.remove('is-hovered');
    });
  });
</script>
</body>
</html>
