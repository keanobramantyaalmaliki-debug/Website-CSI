<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero — CSI Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0A0A0A;
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #trail {
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0;
  }

  /* ── Navbar shared base ── */
  #navbar-minimal,
  #navbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 30;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2.5vw;
    height: 64px;
    pointer-events: none;
  }

  /* Sphere phase: visible from start */
  #navbar-minimal {
    opacity: 1;
    pointer-events: auto;
  }

  /* Text phase: hidden until entry animation */
  #navbar {
    opacity: 0;
  }

  /* Enable pointer events once visible */
  #navbar.is-visible { pointer-events: auto; }

  .nav-menu {
    font-size: 12.5px;
    letter-spacing: 0.11em;
    text-transform: uppercase;
    color: #555;
    cursor: pointer;
    transition: color 0.25s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-menu::before {
    content: '';
    display: block;
    width: 20px;
    height: 1px;
    background: currentColor;
    transition: width 0.3s ease;
  }

  .nav-menu:hover { color: #E0E0E0; }
  .nav-menu:hover::before { width: 32px; }

  .nav-brand {
    text-decoration: none;
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }

  .nav-brand img {
    height: 30px;
    width: auto;
    mix-blend-mode: screen;
    opacity: 1;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 40px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  .nav-links a {
    font-size: 12.5px;
    letter-spacing: 0.11em;
    text-transform: uppercase;
    color: #555;
    text-decoration: none;
    transition: color 0.25s;
    white-space: nowrap;
  }

  .nav-links a:hover { color: #E0E0E0; }

  .nav-cta {
    font-size: 12.5px;
    letter-spacing: 0.11em;
    text-transform: uppercase;
    color: #555;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: color 0.25s;
    flex-shrink: 0;
  }

  .nav-cta::after {
    content: '';
    display: block;
    width: 20px;
    height: 1px;
    background: currentColor;
    transition: width 0.3s ease;
  }

  .nav-cta:hover { color: #E0E0E0; }
  .nav-cta:hover::after { width: 34px; }

  /* ── Fullscreen menu overlay ── */
  #menu-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #0A0A0A;
    display: flex;
    flex-direction: column;
    padding: 0 2.5vw;
    opacity: 0;
    pointer-events: none;
  }

  #menu-overlay.is-open {
    pointer-events: auto;
  }

  .menu-top {
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .menu-close {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 12.5px;
    letter-spacing: 0.11em;
    text-transform: uppercase;
    color: #E0E0E0;
    cursor: pointer;
    padding: 0;
    transition: opacity 0.2s;
  }
  .menu-close:hover { opacity: 0.5; }

  /* Body: 3 columns */
  .menu-body {
    flex: 1;
    display: grid;
    grid-template-columns: 200px 1fr 260px;
    align-items: start;
    padding-top: 80px;
    overflow: hidden;
  }

  /* Left: socials */
  .menu-socials {
    display: flex;
    flex-direction: column;
  }

  .menu-socials-links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .menu-socials a {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #555;
    text-decoration: none;
    transition: color 0.2s;
  }
  .menu-socials a:hover { color: #E0E0E0; }

  /* Center: big nav links */
  .menu-nav {
    display: flex;
    flex-direction: column;
  }

  .menu-nav-item {
    overflow: hidden; /* clips the slide-up per item */
  }

  .menu-nav a {
    font-size: clamp(32px, 4vw, 58px);
    font-weight: 300;
    color: #E8E8E8;
    text-decoration: none;
    line-height: 1.55;
    letter-spacing: -0.03em;
    display: block;
    transition: opacity 0.25s;
  }

  .menu-nav:hover a { opacity: 0.2; }
  .menu-nav:hover .menu-nav-item:hover a { opacity: 1; }

  /* Right: CTA block */
  .menu-right {
    display: flex;
    flex-direction: column;
    gap: 0;
    padding-top: 6px;
  }

  .menu-right-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0;
    border-bottom: 1px solid #1A1A1A;
    text-decoration: none;
    gap: 20px;
  }

  .menu-right-item:first-child { border-top: 1px solid #1A1A1A; }

  .menu-right-item span {
    font-size: 17px;
    font-weight: 300;
    color: #D0D0D0;
    letter-spacing: -0.02em;
    transition: color 0.2s;
  }

  .menu-right-item .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #2A2A2A;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .menu-right-item:hover span { color: #fff; }
  .menu-right-item:hover .dot { background: #fff; }

  /* Bottom: timezones */
  .menu-bottom {
    padding: 48px 0;
    flex-shrink: 0;
    display: grid;
    grid-template-columns: 180px 1fr;
  }

  .menu-times {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: clamp(80px, 11vw, 160px);
  }

  .tz-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .tz-name {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #2E2E2E;
  }

  .tz-time {
    font-size: 26px;
    font-weight: 300;
    color: #888;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }

  #hero-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 10;
    will-change: transform, opacity;
  }

  .hero {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 0 2.5vw;
    z-index: 5;
    opacity: 0;
  }

  .headline {
    font-size: clamp(36px, 5.5vw, 88px);
    font-weight: 400;
    color: #F0F0F0;
    line-height: 1.1;
    letter-spacing: -0.04em;
    max-width: 900px;
  }

  /* Mini orb lives inline inside the headline */
  .orb-slot {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    vertical-align: middle;
    width: 0.62em;
    height: 0.62em;
    margin: 0 0.06em;
    position: relative;
  }

  .orb-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.28);
    animation: pulse-ring 3.5s ease-in-out infinite;
  }

  .orb-core {
    width: 28%;
    height: 28%;
    border-radius: 50%;
    background: rgba(255,255,255,0.8);
    box-shadow: 0 0 10px 3px rgba(255,255,255,0.15);
    animation: pulse-core 3.5s ease-in-out infinite;
  }

  @keyframes pulse-ring {
    0%, 100% { transform: scale(1);    opacity: 0.45; }
    50%       { transform: scale(1.1); opacity: 0.85; }
  }

  @keyframes pulse-core {
    0%, 100% { transform: scale(1);    opacity: 0.7; }
    50%       { transform: scale(1.2); opacity: 1;   }
  }

  .subtext {
    margin-top: 40px;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #606060;
    opacity: 0;
  }

  .cta {
    margin-top: 52px;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #606060;
    cursor: pointer;
    opacity: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: color 0.3s;
    user-select: none;
  }
  .cta::after {
    content: '';
    display: block;
    width: 24px;
    height: 1px;
    background: currentColor;
    transition: width 0.3s;
  }
  .cta:hover { color: #E0E0E0; }
  .cta:hover::after { width: 44px; }

  /* Scroll hint */
  .scroll-hint {
    position: fixed;
    bottom: 44px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 12;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    font-size: 8px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #2A2A2A;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }

  .scroll-track {
    width: 1px;
    height: 44px;
    background: #1C1C1C;
    position: relative;
    overflow: hidden;
  }

  .scroll-dot {
    position: absolute;
    top: -3px;
    left: -1px;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #3A3A3A;
    animation: dot-fall 1.8s ease-in-out infinite;
  }

  @keyframes dot-fall {
    0%   { top: -3px;            opacity: 0; }
    15%  { opacity: 1; }
    85%  { opacity: 1; }
    100% { top: calc(100% + 3px); opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="trail"></canvas>
<canvas id="hero-canvas"></canvas>

<!-- Fullscreen menu overlay -->
<div id="menu-overlay">
  <div class="menu-top">
    <a class="nav-brand" href="#"><img src="Logo/Logo-Final.png" alt="cogniti"></a>
    <button class="menu-close" id="menuClose">Close.</button>
  </div>

  <div class="menu-body">
    <!-- Left: socials top + timezones bottom -->
    <div class="menu-socials">
      <div class="menu-socials-links">

    <!-- Center: main nav -->

</div>

<!-- Sphere phase: minimal navbar -->
<nav id="navbar-minimal">
  <a class="nav-brand" href="#"><img src="Logo/Logo-Final.png" alt="cogniti"></a>
  <span class="nav-menu" id="menuToggle">Menu</span>
</nav>

<!-- Text phase: full navbar -->
<nav id="navbar">
  <a class="nav-brand" href="#"><img src="Logo/Logo-Final.png" alt="cogniti"></a>
  <div class="nav-links">
    <a href="#">Thinking</a>

<div class="scroll-hint" id="scrollHint">
  <span>scroll</span>
  <div class="scroll-track"><div class="scroll-dot"></div></div>
</div>

<div class="hero" id="hero">
  <h1 class="headline">
    We build the
    <span class="orb-slot" id="orbSlot">
      <span class="orb-ring"></span>
      <span class="orb-core"></span>
    </span>
    infrastructure<br>that thinks.
  </h1>
  <p class="subtext">Intelligence Infrastructure &mdash; Cognitiva Solusi Indonesia</p>
  <span class="cta">Explore our thinking</span>
</div>

<script>
/* ── Ambient trail ── */
(function () {
  const canvas = document.getElementById('trail');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const E = { trails: 20, size: 60, friction: 0.5, dampening: 0.25, tension: 0.988 };
  const pos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
  const f = { phase: 0, frequency: 0.002, amplitude: 10, offset: 220,
    update() { this.phase += this.frequency; return Math.round(this.offset + Math.sin(this.phase) * this.amplitude); }
  };
  function Node() { this.x = pos.x; this.y = pos.y; this.vx = 0; this.vy = 0; }
  function Line(s) {
    this.spring = s + (Math.random() * 0.1 - 0.05);
    this.friction = E.friction + (Math.random() * 0.01 - 0.005);
    this.nodes = [];
    for (let i = 0; i < E.size; i++) this.nodes.push(new Node());
  }
  Line.prototype.update = function () {
    let s = this.spring, n = this.nodes[0];
    n.vx += (pos.x - n.x) * s; n.vy += (pos.y - n.y) * s;
    for (let i = 0; i < this.nodes.length; i++) {
      n = this.nodes[i];
      if (i > 0) {
        const p = this.nodes[i - 1];
        n.vx += (p.x - n.x) * s; n.vy += (p.y - n.y) * s;
        n.vx += p.vx * E.dampening; n.vy += p.vy * E.dampening;
      }
      n.vx *= this.friction; n.vy *= this.friction;
      n.x += n.vx; n.y += n.vy; s *= E.tension;
    }
  };
  Line.prototype.draw = function () {
    let x = this.nodes[0].x, y = this.nodes[0].y;
    ctx.beginPath(); ctx.moveTo(x, y);
    for (let i = 1; i < this.nodes.length - 2; i++) {
      const n = this.nodes[i], nx = this.nodes[i + 1];
      x = (n.x + nx.x) * 0.5; y = (n.y + nx.y) * 0.5;
      ctx.quadraticCurveTo(n.x, n.y, x, y);
    }
    const n = this.nodes[this.nodes.length - 2];
    ctx.quadraticCurveTo(n.x, n.y, this.nodes[this.nodes.length - 1].x, this.nodes[this.nodes.length - 1].y);
    ctx.stroke();
  };
  const lines = [];
  for (let i = 0; i < E.trails; i++) lines.push(new Line(0.4 + (i / E.trails) * 0.025));
  document.addEventListener('mousemove', e => { pos.x = e.clientX; pos.y = e.clientY; });
  window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
  (function render() {
    ctx.globalCompositeOperation = 'source-over';
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.globalCompositeOperation = 'lighter';
    ctx.strokeStyle = 'hsla(' + f.update() + ',10%,95%,0.035)';
    ctx.lineWidth = 0.75;
    for (let i = 0; i < E.trails; i++) { lines[i].update(); lines[i].draw(); }
    requestAnimationFrame(render);
  })();
})();


/* ── Vertex glow: handled inside Three.js loop below ── */

/* ── Three.js morphing sphere ── */
const hCanvas  = document.getElementById('hero-canvas');
const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 2.8;

const renderer = new THREE.WebGLRenderer({ canvas: hCanvas, antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const geo     = new THREE.IcosahedronGeometry(1, 5);
const origPos = new Float32Array(geo.attributes.position.array);
const nVerts  = geo.attributes.position.count;

/* Base color buffer — drives pts (NormalBlending): dim base → bright near cursor */
const BASE_BRIGHT  = 0.28;
const colorBase    = new Float32Array(nVerts * 3);
for (let i = 0; i < colorBase.length; i++) colorBase[i] = BASE_BRIGHT;
geo.setAttribute('color', new THREE.BufferAttribute(colorBase, 3));

/* Glow color buffer — drives additive layers: black (invisible) → bright near cursor */
const glowGeo   = new THREE.BufferGeometry();
glowGeo.setAttribute('position', geo.attributes.position);
if (geo.index) glowGeo.setIndex(geo.index);
const colorGlow = new Float32Array(nVerts * 3); // starts at 0 = fully invisible in additive
glowGeo.setAttribute('color', new THREE.BufferAttribute(colorGlow, 3));

/* Layer 1 — base wireframe (fixed, dim, always visible) */
const wireMesh = new THREE.Mesh(geo,
  new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.06 })
);
scene.add(wireMesh);

/* Layer 2 — base dots (NormalBlending, vertex colors shift dim → bright) */
const pts = new THREE.Points(geo,
  new THREE.PointsMaterial({ size: 0.016, transparent: true, opacity: 1.0, vertexColors: true })
);
scene.add(pts);

/* Layer 3 — glow connections (AdditiveBlending wireframe, black=gone, white=lit) */
const wireGlow = new THREE.Mesh(glowGeo,
  new THREE.MeshBasicMaterial({
    vertexColors: true, wireframe: true,
    transparent: true, opacity: 0.9,
    blending: THREE.AdditiveBlending, depthWrite: false
  })
);
scene.add(wireGlow);

/* Layer 4 — glow dot halos (AdditiveBlending, larger, same glow buffer) */
const ptsGlow = new THREE.Points(glowGeo,
  new THREE.PointsMaterial({
    size: 0.06, transparent: true, opacity: 0.8,
    vertexColors: true,
    blending: THREE.AdditiveBlending, depthWrite: false
  })
);
scene.add(ptsGlow);

scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(0.7, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.025 })
));

let mouse = { x: 0, y: 0 };
document.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
  mouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
});

/* ── Ripple state (object space) ── */
const ripples      = [];
const RIPPLE_SPEED = 1.5;   // radians/sec — ring expansion rate
const RIPPLE_LIFE  = 1.6;   // seconds before fully faded
const RIPPLE_SIGMA = 0.14;  // ring band width in radians
const BOW_ANGLE    = 0.38;  // V-arm angle from velocity (~22°, Kelvin-like)
const ARM_SIGMA    = 0.42;  // angular width of each V-arm
const MAX_RIPPLES  = 12;
let lastRippleX    = -9999, lastRippleY = -9999;
let lastFrameTime  = performance.now();
let glowActive     = false;

// Helpers for ray → sphere intersection
const _raySphere = new THREE.Sphere(new THREE.Vector3(0, 0, 0), 0.72);
const _ray       = new THREE.Ray();
const _rayHit    = new THREE.Vector3();
const _invMat    = new THREE.Matrix4();
const _screenV   = new THREE.Vector3();
let   _lastObjPos = null; // previous cursor hit in object space

document.addEventListener('mousemove', e => {
  const dx = e.clientX - lastRippleX;
  const dy = e.clientY - lastRippleY;
  if (Math.hypot(dx, dy) > 10) {
    const ndcX = (e.clientX / window.innerWidth)  * 2 - 1;
    const ndcY = -(e.clientY / window.innerHeight) * 2 + 1;
    _screenV.set(ndcX, ndcY, 0.5).unproject(camera);
    _ray.set(camera.position, _screenV.sub(camera.position).normalize());

    if (_ray.intersectSphere(_raySphere, _rayHit)) {
      _invMat.copy(pts.matrixWorld).invert();
      _rayHit.applyMatrix4(_invMat).normalize();

      const curP = _rayHit.clone();
      let curV = null;

      if (_lastObjPos) {
        const vel   = curP.clone().sub(_lastObjPos);
        const speed = vel.length();
        if (speed > 0.001) {
          curV = vel.normalize(); // velocity direction for V-mask
        }
      }
      _lastObjPos = curP;

      if (ripples.length >= MAX_RIPPLES) ripples.shift();
      ripples.push({ p: curP, v: curV, age: 0 }); // spawn at cursor, ring expands from here
      lastRippleX = e.clientX;
      lastRippleY = e.clientY;
    }
  }
});

let time = 0;
(function threeLoop() {
  requestAnimationFrame(threeLoop);
  time += 0.006;

  const p = geo.attributes.position.array;
  for (let i = 0; i < p.length; i += 3) {
    const ox = origPos[i], oy = origPos[i+1], oz = origPos[i+2];
    const n  = 0.12 * (
      Math.sin(time * 1.8 + ox * 2.5) *
      Math.cos(time * 1.2 + oy * 2.0) *
      Math.sin(time * 0.9 + oz * 1.5)
    );
    const len = Math.sqrt(ox*ox + oy*oy + oz*oz);
    const s   = (1 + n) / len;
    p[i]   = ox * s;
    p[i+1] = oy * s;
    p[i+2] = oz * s;
  }
  geo.attributes.position.needsUpdate = true;

  wireMesh.rotation.y = time * 0.12 + mouse.x * 0.25;
  wireMesh.rotation.x = time * 0.07 + mouse.y * 0.15;
  pts.rotation.copy(wireMesh.rotation);
  wireGlow.rotation.copy(wireMesh.rotation);
  ptsGlow.rotation.copy(wireMesh.rotation);

  /* ── Ripple wave glow (object space) ── */
  const now = performance.now();
  const dt  = Math.min((now - lastFrameTime) / 1000, 0.05);
  lastFrameTime = now;

  for (let r = ripples.length - 1; r >= 0; r--) {
    ripples[r].age += dt;
    if (ripples[r].age > RIPPLE_LIFE) ripples.splice(r, 1);
  }

  const cBase   = geo.attributes.color;
  const cGlow   = glowGeo.attributes.color;
  const posAttr = geo.attributes.position;

  if (ripples.length === 0) {
    if (glowActive) {
      for (let i = 0; i < posAttr.count; i++) {
        cBase.setXYZ(i, BASE_BRIGHT, BASE_BRIGHT, BASE_BRIGHT);
        cGlow.setXYZ(i, 0, 0, 0);
      }
      cBase.needsUpdate = true;
      cGlow.needsUpdate = true;
      glowActive = false;
    }
  } else {
    glowActive = true;
    const sig2      = 2 * RIPPLE_SIGMA * RIPPLE_SIGMA;
    const sig2trail = sig2 * 8; // wide trailing edge → slow fade after ring passes
    const arm2      = 2 * ARM_SIGMA * ARM_SIGMA; // precomputed once
    const BAND      = 3 * RIPPLE_SIGMA;           // beyond 3σ, exp < 0.01 — skip

    // Per-ripple cache: compute ring bounds in cosA-space so the inner vertex loop
    // can early-exit with a cheap dot-product comparison instead of calling acos.
    const rpCache = ripples.map(rp => {
      const r   = RIPPLE_SPEED * rp.age;
      const rMx = Math.min(r + BAND, Math.PI);
      const rMn = Math.max(r - BAND, 0);
      return {
        rp,
        cosLo : Math.cos(rMx), // cos(maxDist) — lower bound for cosA
        cosHi : Math.cos(rMn), // cos(minDist) — upper bound for cosA
        fade  : Math.cos((rp.age / RIPPLE_LIFE) * Math.PI * 0.5),
        ringR : r
      };
    });

    for (let i = 0; i < posAttr.count; i++) {
      const vx = posAttr.getX(i), vy = posAttr.getY(i), vz = posAttr.getZ(i);
      const vl = Math.sqrt(vx*vx + vy*vy + vz*vz) || 1;
      const nx = vx/vl, ny = vy/vl, nz = vz/vl;

      let g = 0;
      for (const { rp, cosLo, cosHi, fade, ringR } of rpCache) {
        // Cheap dot product — skip vertex if it's not near this ring band
        const cosA = nx*rp.p.x + ny*rp.p.y + nz*rp.p.z;
        if (cosA < cosLo || cosA > cosHi) continue;

        // Only now pay for acos + exp
        const angDist = Math.acos(Math.max(-1, Math.min(1, cosA)));
        const diff    = angDist - ringR;
        const s2      = diff >= 0 ? sig2 : sig2trail;
        const ring    = Math.exp(-(diff * diff) / s2) * fade;

        // V-mask: restrict glow to forward V-arms, nothing behind cursor
        let vmask = 1.0;
        if (rp.v) {
          const tx  = nx - cosA * rp.p.x;
          const ty  = ny - cosA * rp.p.y;
          const tz  = nz - cosA * rp.p.z;
          const fwd = tx*rp.v.x + ty*rp.v.y + tz*rp.v.z;
          if (fwd <= 0) {
            continue; // behind — skip entirely
          }
          const side2 = Math.max(0, tx*tx + ty*ty + tz*tz - fwd*fwd);
          const aFV   = Math.atan2(Math.sqrt(side2), fwd);
          vmask = Math.exp(-((aFV - BOW_ANGLE) * (aFV - BOW_ANGLE)) / arm2);
        }

        g += ring * vmask;
      }
      g = Math.min(1, g);

      const b = BASE_BRIGHT + (1.0 - BASE_BRIGHT) * g;
      cBase.setXYZ(i, b, b, b);
      cGlow.setXYZ(i, g, g, g);
    }
    cBase.needsUpdate = true;
    cGlow.needsUpdate = true;
  }

  renderer.render(scene, camera);
})();

/* ── Entry animation: sphere collapses into headline orb ── */
function playEntry() {
  const orbSlot = document.getElementById('orbSlot');
  const rect    = orbSlot.getBoundingClientRect();

  const targetX = rect.left + rect.width  / 2;
  const targetY = rect.top  + rect.height / 2;
  const startX  = window.innerWidth  / 2;
  const startY  = window.innerHeight / 2;

  /* Scale the full-viewport canvas down to roughly the orb's visual size */
  const orbPx      = rect.height * 1.5;
  const scaleFactor = orbPx / window.innerWidth;

  const tl = gsap.timeline();

  /* Brief idle before collapse */
  tl.to({}, { duration: 0.3 });

  /* Minimal navbar fades out upward as sphere starts collapsing */
  tl.to('#navbar-minimal', { opacity: 0, y: -18, duration: 0.45, ease: 'power2.in' }, '<');

  /* Collapse toward orb slot position */
  tl.to(hCanvas, {
    x: targetX - startX,
    y: targetY - startY,
    scale: scaleFactor,
    duration: 1.1,
    ease: 'power4.inOut',
    transformOrigin: 'center center'
  }, '-=0.3');

  /* Canvas fades out while hero content fades in */
  tl.to(hCanvas,  { opacity: 0, duration: 0.25, ease: 'power2.in'  }, '-=0.15');
  tl.to('#hero',  { opacity: 1, duration: 0.55, ease: 'power2.out' }, '-=0.1' );

  /* Full navbar rises from below as text appears */
  tl.fromTo('#navbar',
    { opacity: 0, y: 16 },
    { opacity: 1, y: 0, duration: 0.55, ease: 'power2.out',
      onComplete: () => document.getElementById('navbar').classList.add('is-visible') },
    '-=0.35'
  );

  /* Subtext and CTA stagger in */
  tl.to('.subtext', { opacity: 1, duration: 0.5, ease: 'power2.out' }, '+=0.1');
  tl.to('.cta',     { opacity: 1, duration: 0.4, ease: 'power2.out' }, '-=0.2' );

  /* Trail fades in once text is visible */
  tl.to('#trail',   { opacity: 1, duration: 1.2, ease: 'power2.out' }, '-=0.3');
}

function onFirstScroll() {
  window.removeEventListener('wheel',     onFirstScroll);
  window.removeEventListener('touchmove', onFirstScroll);
  gsap.to('#scrollHint', { opacity: 0, duration: 0.3 });
  playEntry();
}

window.addEventListener('wheel',     onFirstScroll, { passive: true });
window.addEventListener('touchmove', onFirstScroll, { passive: true });

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ── Fullscreen menu ── */
(function () {
  const overlay   = document.getElementById('menu-overlay');
  const toggle    = document.getElementById('menuToggle');
  const closeBtn  = document.getElementById('menuClose');
  let isOpen      = false;

  /* Live clocks — WIB (UTC+7), WITA (UTC+8), WIT (UTC+9) */
  function updateClocks() {
    const fmt = tz => new Date().toLocaleTimeString('en-GB', {
      hour: '2-digit', minute: '2-digit', timeZone: tz
    });
    document.getElementById('timeWIB').textContent  = fmt('Asia/Jakarta');
    document.getElementById('timeWITA').textContent = fmt('Asia/Makassar');
    document.getElementById('timeWIT').textContent  = fmt('Asia/Jayapura');
  }
  updateClocks();
  setInterval(updateClocks, 1000);

  function openMenu() {
    if (isOpen) return;
    isOpen = true;
    overlay.classList.add('is-open');

    // Set initial states explicitly before animating
    gsap.set('.menu-nav a',          { y: 56, opacity: 0 });
    gsap.set('.menu-socials a',       { opacity: 0 });
    gsap.set(['.menu-right-item', '.tz-item'], { opacity: 0 });

    const tl = gsap.timeline();
    tl.to(overlay, { opacity: 1, duration: 0.3, ease: 'power2.out' });
    tl.to('.menu-nav a', {
      y: 0, opacity: 1,
      stagger: 0.08,
      duration: 0.65,
      ease: 'power3.out'
    }, '-=0.1');
    tl.to('.menu-socials a', {
      opacity: 1, stagger: 0.06, duration: 0.35, ease: 'power2.out'
    }, '-=0.5');
    tl.to(['.menu-right-item', '.tz-item'], {
      opacity: 1, stagger: 0.05, duration: 0.3, ease: 'power2.out'
    }, '-=0.35');
  }

  function closeMenu() {
    if (!isOpen) return;
    isOpen = false;
    gsap.to(overlay, {
      opacity: 0, duration: 0.3, ease: 'power2.in',
      onComplete: () => overlay.classList.remove('is-open')
    });
  }

  if (toggle) toggle.addEventListener('click', openMenu);
  closeBtn.addEventListener('click', closeMenu);

  /* Close on Escape */
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); });
})();
</script>
</body>
