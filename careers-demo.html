<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Careers — CSI Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root { --pad: 2.5vw; }

  body {
    background: #0A0A0A;
    color: #F0F0F0;
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
  }

  #trail {
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 0;
  }

  #careers {
    position: relative;
    min-height: 100vh;
    padding: 120px var(--pad);
    z-index: 1;
  }

  .section-label {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #3A3A3A;
    margin-bottom: 72px;
  }

  /* — placeholder kosong — */
  .careers-placeholder {
    width: 100%;
    height: 60vh;
    border: 1px dashed #1A1A1A;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #222;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<canvas id="trail"></canvas>

<section id="careers">
  <p class="section-label">Careers</p>
  <div class="careers-placeholder">konten careers — TBD</div>
</section>

<script>
  (function () {
    const canvas = document.getElementById('trail');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const E = { trails: 20, size: 60, friction: 0.5, dampening: 0.25, tension: 0.988 };
    const pos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    const f = { phase: 0, frequency: 0.002, amplitude: 10, offset: 220,
      update() { this.phase += this.frequency; return Math.round(this.offset + Math.sin(this.phase) * this.amplitude); }
    };
    function Node() { this.x = pos.x; this.y = pos.y; this.vx = 0; this.vy = 0; }
    function Line(s) {
      this.spring = s + (Math.random() * 0.1 - 0.05);
      this.friction = E.friction + (Math.random() * 0.01 - 0.005);
      this.nodes = [];
      for (let i = 0; i < E.size; i++) this.nodes.push(new Node());
    }
    Line.prototype.update = function () {
      let s = this.spring, n = this.nodes[0];
      n.vx += (pos.x - n.x) * s; n.vy += (pos.y - n.y) * s;
      for (let i = 0; i < this.nodes.length; i++) {
        n = this.nodes[i];
        if (i > 0) {
          const p = this.nodes[i - 1];
          n.vx += (p.x - n.x) * s; n.vy += (p.y - n.y) * s;
          n.vx += p.vx * E.dampening; n.vy += p.vy * E.dampening;
        }
        n.vx *= this.friction; n.vy *= this.friction;
        n.x += n.vx; n.y += n.vy; s *= E.tension;
      }
    };
    Line.prototype.draw = function () {
      let x = this.nodes[0].x, y = this.nodes[0].y;
      ctx.beginPath(); ctx.moveTo(x, y);
      for (let i = 1; i < this.nodes.length - 2; i++) {
        const n = this.nodes[i], nx = this.nodes[i + 1];
        x = (n.x + nx.x) * 0.5; y = (n.y + nx.y) * 0.5;
        ctx.quadraticCurveTo(n.x, n.y, x, y);
      }
      const n = this.nodes[this.nodes.length - 2];
      ctx.quadraticCurveTo(n.x, n.y, this.nodes[this.nodes.length - 1].x, this.nodes[this.nodes.length - 1].y);
      ctx.stroke();
    };
    const lines = [];
    for (let i = 0; i < E.trails; i++) lines.push(new Line(0.4 + (i / E.trails) * 0.025));
    document.addEventListener('mousemove', e => { pos.x = e.clientX; pos.y = e.clientY; });
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    (function render() {
      ctx.globalCompositeOperation = 'source-over';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = 'hsla(' + f.update() + ',10%,95%,0.035)';
      ctx.lineWidth = 0.75;
      for (let i = 0; i < E.trails; i++) { lines[i].update(); lines[i].draw(); }
      requestAnimationFrame(render);
    })();
  })();
</script>
</body>
</html>
